version: 2

project_name: gither

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gither
    main: ./cmd/gither
    binary: gither
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - gither
    files:
      - LICENSE
      - README.md
      - INSTALL.md
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: pixelkarma
    name: gither
