name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go build ./cmd/gither
      - run: bash -n ./scripts/render_examples.sh ./scripts/render_dbs_examples.sh ./scripts/benchmark_dbs.sh
